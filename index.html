<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo"><a href="#">QuAnTa</a></div>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
        <button id="signup-btn">Sign Up</button>
    </header>
    <main>
        <section class="hero">
            <div class="container">
                <h2>Start Growing Your <span id="business">Business</span></h2>
                <p>Join and let us help you reach your goals.</p>
                <div class="btn-container">
                    <button id="btn-1">Get Started</button>
                    <button id="btn-2">Learn More</button>
                </div>
            </div>
            <div class="svg-container">
                <img src="media\Pitch meeting-bro.svg" alt="Business analytics illustration">
            </div>
        </section>
        <section class="cards">
            <div class="card">
                <div class="icon">
                    <img src="media\sales.png" alt="Sales icon">
                </div>
                <h2>Boost Sales</h2>
                <p>Increase revenue</p>
            </div>
            <div class="card">
                <div class="icon">
                    <img src="media\problem-solving.png" alt="Solution icon" height="64px">
                </div>
                <h2>Marketing Solutions</h2>
                <p>Grow your audience</p>
            </div>
            <div class="card">
                <div class="icon">
                    <img src="media\customer-service.png" alt="Service icon" height="64px">
                </div>
                <h2>Support</h2>
                <p>We're here to help</p>
            </div>
        </section>
    </main>
    <footer>
        <a href="https://storyset.com/data">Data illustrations by Storyset</a>
        <a href="https://www.flaticon.com/free-icons/sales-marketing">icons created by iconsitee - Flaticon</a>
    </footer>
</body>

</html>
